const DROP_SLOTS = 6;

function readHash() {
  const m = window.location.hash.match(/album=([a-z]+)/);
  return m && ALBUMS.some((a) => a.key === m[1]) ? m[1] : null;
}

        <div className="absolute inset-0" style={{ background: "linear-gradient(180deg, transparent 40%, rgba(7,7,8,.9) 100%)" }}></div>
        <div className="absolute top-3 right-3 px-2.5 py-1 rounded-full bg-ink-900/70 backdrop-blur-md border border-white/10 font-mono text-[10px] tracking-[.16em] text-bone-100">
          {a.photos.length} photos
        </div>
        <div className="absolute bottom-0 left-0 right-0 p-5">
          <div className="font-display text-[24px] leading-tight text-white">{a.name}</div>
          <p className="mt-1 text-[13px] text-bone-200/85 leading-snug">{a.desc}</p>
        </div>
      </div>
      <div className="flex items-center justify-between px-5 py-3 border-t border-white/10">
        <span className="font-mono text-[10px] tracking-[.22em] uppercase text-gold-300">Ouvrir l'album</span>
        <span className="text-gold-300 transition group-hover:translate-x-1">→</span>
      </div>
    </button>
  );
}

function AlbumView({ a, onBack }) {
  const [open, setOpen] = React.useState(null);

  React.useEffect(() => {
    const onKey = (e) => {
      if (open === null) return;
      if (e.key === "Escape") setOpen(null);
      if (e.key === "ArrowRight") setOpen((o) => (o + 1) % a.photos.length);
      if (e.key === "ArrowLeft") setOpen((o) => (o - 1 + a.photos.length) % a.photos.length);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, a]);

  return (
    <div className="fade-in" data-screen-label={`Album ${a.name}`}>
      <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-5 mb-10">
        <div>
          <button onClick={onBack} className="font-mono text-[11px] tracking-[.2em] uppercase text-gold-300 hover:text-gold-200 transition mb-5 inline-flex items-center gap-2">← Tous les albums</button>
          <h1 className="font-display text-[clamp(34px,5vw,60px)] leading-[1] text-bone-50">{a.name}</h1>
          <p className="mt-3 max-w-xl text-[15px] text-bone-300">{a.desc}</p>
        </div>
        <div className="font-mono text-[11px] tracking-[.18em] uppercase text-bone-400">{a.photos.length} photos · glissez-en d'autres ci-dessous</div>
      </div>

      <div className="masonry">
        {a.photos.map((p, i) => (
          <button key={p.src} onClick={() => setOpen(i)} className="group relative w-full block overflow-hidden rounded-[2px]">
            <img src={p.src} alt={p.label} loading="lazy" className="w-full h-auto block transition duration-700 group-hover:scale-[1.03]" />
            <div className="absolute inset-0 bg-ink-900/0 group-hover:bg-ink-900/40 transition"></div>
            <div className="absolute bottom-0 left-0 right-0 p-4 opacity-0 group-hover:opacity-100 transition" style={{ background: "linear-gradient(180deg, transparent, rgba(0,0,0,.8))" }}>
              <span className="text-[13px] text-white">{p.label}</span>
            </div>
          </button>
        ))}

        {Array.from({ length: DROP_SLOTS }).map((_, n) => (
          <div key={n} className="relative w-full overflow-hidden rounded-[2px] border border-dashed border-white/20 hover:border-gold-400/60 transition" style={{ aspectRatio: "4/3" }}>
            <image-slot
              id={`alb-${a.key}-slot-${n + 1}`}
              shape="rect"
              style={{ position: "absolute", inset: 0, width: "100%", height: "100%", display: "block" }}
              placeholder={`Glissez une photo · ${a.name}`}>
            </image-slot>
          </div>
        ))}
      </div>

      {open !== null && (
        <div className="lightbox" onClick={() => setOpen(null)}>
          <button onClick={() => setOpen(null)} className="absolute top-6 right-6 w-12 h-12 rounded-full bg-bone-50 text-ink-900 grid place-items-center text-[18px]">✕</button>
          <button onClick={(e) => { e.stopPropagation(); setOpen((open - 1 + a.photos.length) % a.photos.length); }} className="absolute left-5 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full border border-white/25 text-bone-50 grid place-items-center hover:bg-white/10 z-10">←</button>
          <button onClick={(e) => { e.stopPropagation(); setOpen((open + 1) % a.photos.length); }} className="absolute right-5 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full border border-white/25 text-bone-50 grid place-items-center hover:bg-white/10 z-10">→</button>
          <div onClick={(e) => e.stopPropagation()} className="relative max-w-[88vw]">
            <img src={a.photos[open].src} alt={a.photos[open].label} className="max-w-[88vw] max-h-[76vh] w-auto h-auto object-contain block mx-auto" />
            <div className="mt-4 flex items-center justify-between gap-6">
              <div className="font-display text-[20px] text-bone-50">{a.photos[open].label}</div>
              <div className="font-mono text-[11px] text-bone-400">{String(open + 1).padStart(2, '0')} / {String(a.photos.length).padStart(2, '0')}</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [albumKey, setAlbumKey] = React.useState(readHash());

  React.useEffect(() => {
    const onHash = () => setAlbumKey(readHash());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const openAlbum = (key) => { window.location.hash = key ? `album=${key}` : ""; window.scrollTo(0, 0); };
  const album = ALBUMS.find((a) => a.key === albumKey);

  return (
    <div>
      <TopBar/>
      <main className="max-w-[1380px] mx-auto px-6 sm:px-10 lg:px-14 py-14 md:py-20">
        {!album && (
          <div className="fade-in" data-screen-label="Albums">
            <div className="mb-12">
              <div className="eyebrow mb-4"><span style={{ display: "inline-block", width: 5, height: 5, background: "currentColor", borderRadius: 99, marginRight: 10, verticalAlign: "middle" }}></span>Galerie · C.E. Parole Éternelle Ngiri-Ngiri</div>
              <h1 className="font-display text-[clamp(38px,6vw,72px)] leading-[0.98] text-bone-50">Les albums de la maison</h1>
              <p className="mt-4 max-w-2xl text-[16px] text-bone-300 leading-relaxed">
                Cultes, louange, enfants, jeunesse, Jubilé 2026, projet du temple —
                chaque album peut être enrichi : ouvrez-le et glissez vos photos dans les cases prévues.
              </p>
            </div>
            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
              {ALBUMS.map((a) => <AlbumCard key={a.key} a={a} onOpen={openAlbum} />)}
            </div>
          </div>
        )}
        {album && <AlbumView a={album} onBack={() => openAlbum(null)} />}
      </main>

      <footer className="border-t border-white/10 py-10 mt-10">
        <div className="max-w-[1380px] mx-auto px-6 sm:px-10 lg:px-14 flex flex-col md:flex-row items-center justify-between gap-4">
          <div className="font-mono text-[11px] tracking-[.18em] uppercase text-bone-400">© 2026 C.E. Parole Éternelle Ngiri-Ngiri · 2 bis &amp; 4, Av. Monkoto · Kinshasa</div>
          <div className="flex items-center gap-5 font-mono text-[10px] tracking-[.18em] uppercase">
            <a href="https://www.facebook.com/cepeng/" target="_blank" rel="noopener">Facebook</a>
            <a href="https://www.youtube.com/channel/UCPmV9FMnv9imGbnxJdFiMcw" target="_blank" rel="noopener">YouTube</a>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
