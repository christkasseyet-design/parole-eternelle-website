  tailwind.config = {
    theme: {

<style>
  :root{
    --ink-900:#070708; --ink-800:#0a0a0c; --ink-700:#101014; --ink-600:#15161b; --ink-500:#1c1d24;
    --bone-50:#fafaf7; --bone-100:#f3f2ec; --bone-200:#dcdad1; --bone-300:#a3a2a0;
    --gold-200:#e3c98a; --gold-300:#d8b66a; --gold-400:#cba255; --gold-500:#b8924f;
  }
  html{scroll-behavior:smooth;}
  html,body{background:var(--ink-800);color:var(--bone-50);}
  body{font-family:'Manrope',ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv11";}
  .font-display{font-family:'Cormorant Garamond',serif;font-weight:400;}
  .font-mono{font-family:'JetBrains Mono',ui-monospace,monospace;}

  .eyebrow{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-300);}
  .eyebrow .dot{display:inline-block;width:5px;height:5px;background:currentColor;border-radius:99px;margin:0 .7em .15em 0;vertical-align:middle;}

  .rule-gold{height:1px;background:linear-gradient(90deg,transparent,var(--gold-500) 30%,var(--gold-500) 70%,transparent);}

  .ph{
    position:relative;overflow:hidden;background:
      radial-gradient(120% 80% at 30% 20%, rgba(216,182,106,.12), transparent 60%),
      radial-gradient(100% 80% at 80% 90%, rgba(216,182,106,.08), transparent 55%),
      linear-gradient(135deg, #0e0f14 0%, #14161d 50%, #0a0b10 100%);
    isolation:isolate;
  }
  .ph::before{
    content:"";position:absolute;inset:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 14px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 22px);
    mix-blend-mode:overlay;pointer-events:none;
  }
  .ph::after{
    content:"";position:absolute;inset:0;
    background:radial-gradient(60% 60% at 50% 50%, transparent, rgba(0,0,0,.55));
    pointer-events:none;
  }
  .ph-label{
    position:absolute;left:14px;bottom:12px;z-index:2;
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:10px;letter-spacing:.15em;text-transform:uppercase;
    color:rgba(231,219,184,.55);
  }
  .ph-label::before{content:"// ";color:rgba(216,182,106,.5);}

  .grain{position:absolute;inset:0;pointer-events:none;opacity:.5;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.92  0 0 0 0 0.86  0 0 0 0.32 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");}

  .beam{position:absolute;inset:auto 0 0 0;height:80%;pointer-events:none;
    background:radial-gradient(60% 100% at 50% 100%, rgba(216,182,106,.22), transparent 60%);}

  .lift{transition:transform .5s cubic-bezier(.2,.7,.2,1), border-color .3s, background-color .3s;}
  .lift:hover{transform:translateY(-4px);}

  .nav-scrolled{background:rgba(7,7,8,.78);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);border-bottom:1px solid rgba(216,182,106,.12);}

  .reveal{opacity:0;transform:translateY(24px);transition:opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1);}
  .reveal.in{opacity:1;transform:none;}
  .reveal-stagger > * {opacity:0;transform:translateY(18px);transition:opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1);}
  .reveal-stagger.in > *:nth-child(1){transition-delay:.05s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(2){transition-delay:.12s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(3){transition-delay:.19s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(4){transition-delay:.26s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(5){transition-delay:.33s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(6){transition-delay:.40s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(7){transition-delay:.47s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(8){transition-delay:.54s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(n+9){transition-delay:.6s;opacity:1;transform:none}

  @keyframes marq { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  .marq{animation:marq 40s linear infinite;}

  @keyframes slow-zoom { from{transform:scale(1.06)} to{transform:scale(1.18)} }
  .slow-zoom{animation:slow-zoom 22s ease-in-out infinite alternate;}

  .gold-shimmer{
    background:linear-gradient(90deg,#d8b66a 0%,#f6e6b8 40%,#cba255 60%,#d8b66a 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    background-size:200% 100%;animation:shim 8s ease-in-out infinite;
  }
  @keyframes shim {0%,100%{background-position:0 0}50%{background-position:100% 0}}

  .btn{display:inline-flex;align-items:center;gap:.6rem;padding:.85rem 1.4rem;border-radius:999px;font-weight:500;letter-spacing:.02em;font-size:14px;transition:all .25s;}
  .btn-gold{background:var(--gold-300);color:#0a0a0c;}
  .btn-gold:hover{background:var(--gold-200);}
  .btn-ghost{background:transparent;color:var(--bone-50);border:1px solid rgba(231,219,184,.25);}
  .btn-ghost:hover{border-color:var(--gold-300);color:var(--gold-200);}
  .btn-dark{background:rgba(10,10,12,.6);color:var(--bone-50);border:1px solid rgba(255,255,255,.08);}
  .btn-dark:hover{background:rgba(10,10,12,.85);border-color:rgba(216,182,106,.4);}

  .masonry{column-count:1;column-gap:14px;}
  @media (min-width: 640px){.masonry{column-count:2}}
  @media (min-width: 1024px){.masonry{column-count:3}}
  @media (min-width: 1280px){.masonry{column-count:4}}
  .masonry > *{break-inside:avoid;margin-bottom:14px;display:block;}

  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:#0a0a0c}
  ::-webkit-scrollbar-thumb{background:#2d2e37;border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:#3b3c46}

  ::selection{background:var(--gold-400);color:#0a0a0c}

  .tick{font-variant-numeric:tabular-nums;}

  .glow{box-shadow:0 0 0 1px rgba(216,182,106,.18), 0 30px 80px -40px rgba(216,182,106,.45);}

  .lightbox{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;padding:5vw;}
</style>

     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>

  [data-theme="light"] .text-bone-100\/80{color:var(--ink-700)!important}

  [data-theme="light"] .text-gold-200{color:var(--gold-300)!important}

  [data-theme="light"] .text-ink-900{color:#0a2160!important}

  [data-theme="light"] .border-gold-300,
  [data-theme="light"] .hover\:border-gold-300:hover,
  [data-theme="light"] .focus\:border-gold-400:focus{border-color:var(--coral)!important}
  [data-theme="light"] .border-gold-400,
  [data-theme="light"] .hover\:border-gold-400:hover{border-color:var(--coral)!important}
  [data-theme="light"] .border-gold-500\/20,
  [data-theme="light"] .border-gold-500\/30,
  [data-theme="light"] .border-gold-500\/40{border-color:rgba(244,194,56,.35)!important}
  [data-theme="light"] .bg-gold-500\/\[\.06\]{background:var(--coral-soft)!important}
  [data-theme="light"] .ring-gold-400{--tw-ring-color:var(--coral)!important}
  [data-theme="light"] em.text-gold-200{color:var(--coral)!important}

  [data-theme="light"] .border-white\/5,

  [data-theme="light"] .border-white\/15,
  [data-theme="light"] .border-white\/20{border-color:var(--line)!important}
  [data-theme="light"] .border-white\/25,
  [data-theme="light"] .border-white\/30{border-color:var(--line-strong)!important}
  [data-theme="light"] .divide-white\/5 > * + *,
  [data-theme="light"] .divide-white\/10 > * + *{border-color:var(--line)!important}

  [data-theme="light"] .ph{

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
// ═══════════════ ICONS ═══════════════

function Photo({ label, className = "", tone = "default", animated = false, children, style }) {
  const toneStyle = {
    default: {},
    warm: { background: "radial-gradient(120% 80% at 30% 20%, rgba(216,182,106,.18), transparent 60%), radial-gradient(100% 80% at 80% 90%, rgba(216,182,106,.10), transparent 55%), linear-gradient(135deg, #16110a 0%, #1a1610 50%, #0d0b08 100%)" },
    cool: { background: "radial-gradient(120% 80% at 30% 20%, rgba(120,140,180,.12), transparent 60%), radial-gradient(100% 80% at 80% 90%, rgba(80,100,140,.10), transparent 55%), linear-gradient(135deg, #0a0d14 0%, #0e1119 50%, #060810 100%)" },
    deep: { background: "radial-gradient(120% 80% at 30% 20%, rgba(216,182,106,.08), transparent 60%), linear-gradient(135deg, #050507 0%, #0a0b12 100%)" },
  };
  return (
    <div className={`ph ${className}`} style={{ ...(toneStyle[tone] || {}), ...style }}>
      {animated && <div className="absolute inset-0 slow-zoom" style={{ background: "inherit" }} />}
      {children}
      {label && <span className="ph-label">{label}</span>}
    </div>
  );
}

function Eyebrow({ children, className = "" }) {
  return <div className={`eyebrow ${className}`}><span className="dot"></span>{children}</div>;
}

function Heading({ children, className = "", as: As = "h2" }) {
  return <As className={`font-display text-[42px] sm:text-[56px] md:text-[72px] leading-[0.95] tracking-mega text-bone-50 ${className}`}>{children}</As>;
}

function Reveal({ children, stagger = false, className = "", as: As = "div", id }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { el.classList.add("in"); io.unobserve(el); } });
    }, { threshold: 0.15 });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return <As ref={ref} id={id} className={`${stagger ? "reveal-stagger" : "reveal"} ${className}`}>{children}</As>;
}

function Btn({ variant = "gold", children, href, onClick, className = "", icon = true, target }) {
  const cls = `btn btn-${variant} ${className}`;
  const inner = <>{children}{icon && <I.ArrowR width="14" height="14" />}</>;
  return href
    ? <a href={href} onClick={onClick} className={cls} target={target || (href.startsWith("http") ? "_blank" : undefined)} rel={href.startsWith("http") ? "noopener" : undefined}>{inner}</a>
    : <button type="button" onClick={onClick} className={cls}>{inner}</button>;
}

// Image avec repli gracieux — remplace les <image-slot> du prototype.
// Déposez les vraies photos dans assets/ ; tant qu'elles manquent,
// le placeholder cinématique en dessous reste visible.
function Img({ src, alt = "", style, className = "" }) {
  const [ok, setOk] = React.useState(true);
  if (!src || !ok) return null;
  return <img src={src} alt={alt} loading="lazy" onError={() => setOk(false)} className={className} style={{ objectFit: "cover", ...style }} />;
}

function Avatar({ src, fallback, size = 44, alt = "" }) {
  const [ok, setOk] = React.useState(true);
  return ok && src
    ? <img src={src} alt={alt} onError={() => setOk(false)} style={{ width: size, height: size, borderRadius: "50%", objectFit: "cover", flexShrink: 0 }} />
    : <div aria-label={alt} style={{ width: size, height: size, borderRadius: "50%", background: "var(--gold-300)", color: "#0a2160", display: "grid", placeItems: "center", fontWeight: 800, fontSize: Math.round(size * 0.32), flexShrink: 0, fontFamily: "'Archivo',sans-serif" }}>{fallback}</div>;
}

function CalendarView({ events, tagColor }) {
  const evByDay = events.reduce((acc, e) => { (acc[e.d] = acc[e.d] || []).push(e); return acc; }, {});

  return (
    <Reveal>
      <div className="grid grid-cols-7 gap-px bg-white/5 border border-white/10">
        {["LUN","MAR","MER","JEU","VEN","SAM","DIM"].map(d => (
          <div key={d} className="bg-ink-700 py-3 text-center font-mono text-[10px] tracking-[.22em] uppercase text-bone-400">{d}</div>
        ))}
        {/* Mai 2026 commence un vendredi → 4 cases vides depuis lundi */}
        {Array.from({length: 4}).map((_, i) => <div key={"e"+i} className="bg-ink-800 min-h-[110px]"></div>)}
        {Array.from({length: 31}).map((_, i) => {
          const d = i + 1;
          const evs = evByDay[d] || [];
          const isToday = d === 15;
          return (
            <div key={d} className={`bg-ink-700 min-h-[110px] p-2 flex flex-col gap-1 ${isToday ? "ring-1 ring-gold-400 ring-inset" : ""}`}>
              <div className="flex items-center justify-between">
                <span className={`font-mono text-[11px] ${isToday ? "text-gold-300 font-bold" : "text-bone-300"}`}>{d}</span>
                {isToday && <span className="text-[8px] font-mono tracking-[.2em] uppercase text-gold-300">Auj.</span>}
              </div>
              <div className="flex flex-col gap-1 mt-0.5">
                {evs.slice(0,2).map((e, j) => (
                  <div key={j} className={`text-[9px] leading-snug rounded-sm px-1.5 py-1 border ${tagColor(e.tag)} truncate`} title={e.title}>
                    <span className="font-mono opacity-70">{e.h}</span> {e.tag}
                  </div>
                ))}
                {evs.length > 2 && <div className="text-[9px] text-bone-400 font-mono">+{evs.length - 2}</div>}
              </div>
            </div>
          );
        })}
      </div>
    </Reveal>
  );
}
