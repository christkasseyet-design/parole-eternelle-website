<style>
  :root{
    --ink-900:#070708;
    --ink-800:#0a0a0c;
    --ink-700:#101014;
    --ink-600:#15161b;
    --ink-500:#1c1d24;
    --bone-50:#fafaf7;
    --bone-100:#f3f2ec;
    --bone-200:#dcdad1;
    --bone-300:#a3a2a0;
    --gold-200:#e3c98a;
    --gold-300:#d8b66a;
    --gold-400:#cba255;
    --gold-500:#b8924f;
  }
  html,body{background:var(--ink-800);color:var(--bone-50);}
  body{font-family:'Manrope',ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv11";}
  .font-display{font-family:'Cormorant Garamond',serif;font-weight:400;}
  .font-mono{font-family:'JetBrains Mono',ui-monospace,monospace;}

  /* perf: only render sections near the viewport */
  main > section{content-visibility:auto;contain-intrinsic-size:auto 900px;}

  /* eyebrow */
  .eyebrow{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-300);}
  .eyebrow .dot{display:inline-block;width:5px;height:5px;background:currentColor;border-radius:99px;margin:0 .7em .15em 0;vertical-align:middle;}

  /* gold rule */
  .rule-gold{height:1px;background:linear-gradient(90deg,transparent,var(--gold-500) 30%,var(--gold-500) 70%,transparent);}

  /* placeholders for imagery -- cinematic dark with subtle texture */
  .ph{
    position:relative;overflow:hidden;background:
      radial-gradient(120% 80% at 30% 20%, rgba(216,182,106,.12), transparent 60%),
      radial-gradient(100% 80% at 80% 90%, rgba(216,182,106,.08), transparent 55%),
      linear-gradient(135deg, #0e0f14 0%, #14161d 50%, #0a0b10 100%);
    isolation:isolate;
  }
  .ph::before{
    content:"";position:absolute;inset:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 14px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 22px);
    mix-blend-mode:overlay;pointer-events:none;
  }
  .ph::after{
    content:"";position:absolute;inset:0;
    background:radial-gradient(60% 60% at 50% 50%, transparent, rgba(0,0,0,.55));
    pointer-events:none;
  }
  .ph-label{
    position:absolute;left:14px;bottom:12px;z-index:2;
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:10px;letter-spacing:.15em;text-transform:uppercase;
    color:rgba(231,219,184,.55);
  }
  .ph-label::before{content:"// ";color:rgba(216,182,106,.5);}

  /* hero film grain */
  .grain{position:absolute;inset:0;pointer-events:none;opacity:.14;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.92  0 0 0 0 0.86  0 0 0 0.32 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");}

  /* light beam */
  .beam{position:absolute;inset:auto 0 0 0;height:80%;pointer-events:none;
    background:radial-gradient(60% 100% at 50% 100%, rgba(216,182,106,.22), transparent 60%);}

  /* hero entrance */
  @media (prefers-reduced-motion: no-preference){
    @keyframes heroUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:none} }
    .hero-in{animation:heroUp 1s cubic-bezier(.2,.7,.2,1) both}
    .hero-in-late{animation-delay:.25s}
  }

  /* hover lift */
  .lift{transition:transform .5s cubic-bezier(.2,.7,.2,1), border-color .3s, background-color .3s;}
  .lift:hover{transform:translateY(-4px);}

  /* nav scroll state */
  .nav-scrolled{background:rgba(7,7,8,.78);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);border-bottom:1px solid rgba(216,182,106,.12);}

  /* reveal on scroll */
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1);}
  .reveal.in{opacity:1;transform:none;}
  .reveal-stagger > * {opacity:0;transform:translateY(18px);transition:opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1);}
  .reveal-stagger.in > *:nth-child(1){transition-delay:.05s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(2){transition-delay:.12s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(3){transition-delay:.19s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(4){transition-delay:.26s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(5){transition-delay:.33s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(6){transition-delay:.40s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(7){transition-delay:.47s;opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(8){transition-delay:.54s;opacity:1;transform:none}

  /* marquee */
  @keyframes marq { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  .marq{animation:marq 40s linear infinite;}

  /* slow zoom on hero placeholder */
  @keyframes slow-zoom { from{transform:scale(1.06)} to{transform:scale(1.18)} }
  .slow-zoom{animation:slow-zoom 22s ease-in-out infinite alternate;}

  /* gold shimmer for headlines */
  .gold-shimmer{
    background:linear-gradient(90deg,#d8b66a 0%,#f6e6b8 40%,#cba255 60%,#d8b66a 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    background-size:200% 100%;animation:shim 8s ease-in-out infinite;
  }
  @keyframes shim {0%,100%{background-position:0 0}50%{background-position:100% 0}}

  /* btn */
  .btn{display:inline-flex;align-items:center;gap:.6rem;padding:.85rem 1.4rem;border-radius:999px;font-weight:500;letter-spacing:.02em;font-size:14px;transition:all .25s;}
  .btn-gold{background:var(--gold-300);color:#0a0a0c;}
  .btn-gold:hover{background:var(--gold-200);}
  .btn-ghost{background:transparent;color:var(--bone-50);border:1px solid rgba(231,219,184,.25);}
  .btn-ghost:hover{border-color:var(--gold-300);color:var(--gold-200);}
  .btn-dark{background:rgba(10,10,12,.6);color:var(--bone-50);border:1px solid rgba(255,255,255,.08);}
  .btn-dark:hover{background:rgba(10,10,12,.85);border-color:rgba(216,182,106,.4);}

  /* gallery masonry */
  .masonry{column-count:1;column-gap:14px;}
  @media (min-width: 640px){.masonry{column-count:2}}
  @media (min-width: 1024px){.masonry{column-count:3}}
  @media (min-width: 1280px){.masonry{column-count:4}}
  .masonry > *{break-inside:avoid;margin-bottom:14px;display:block;}

  /* tasteful scrollbar */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:#0a0a0c}
  ::-webkit-scrollbar-thumb{background:#2d2e37;border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:#3b3c46}

  /* selection */
  ::selection{background:var(--gold-400);color:#0a0a0c}

  /* number ticker tick */
  .tick{font-variant-numeric:tabular-nums;}

  /* glow */
  .glow{box-shadow:0 0 0 1px rgba(216,182,106,.18), 0 30px 80px -40px rgba(216,182,106,.45);}

  /* lightbox */
  .lightbox{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;padding:5vw;}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     HYBRID THEME — ICF-inspired bright sections (.sec-light) on a
     Hillsong-style cinematic dark base.
     Dark stays: Hero · Médias · Reels · Donner · Footer
     Disable this <style> (Tweaks « Ambiance: sombre ») for full dark.
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style id="hybrid-theme">
  :root{
    --paper:#faf9f5;          /* warm white */
    --paper-2:#f1eee5;        /* cream alt */
    --card:#ffffff;
    --lt-ink:#121216;
    --lt-ink-2:#4b4b52;
    --lt-ink-3:#83838c;
    --lt-line:rgba(18,18,22,.10);
    --lt-line-strong:rgba(18,18,22,.24);
    --gold-ink:#96742f;       /* deep gold, readable on white */
    --gold-deep:#7c5f24;
  }

  /* ── Typography — simplified: one display family, no serif/italic mix, no shimmer ── */
  .font-display{font-family:'Archivo','Manrope',sans-serif;font-weight:700;letter-spacing:-0.025em;}
  .font-display em{font-family:inherit;font-style:normal;font-weight:inherit;letter-spacing:inherit;}
  .gold-shimmer{background:none!important;-webkit-background-clip:initial!important;background-clip:initial!important;color:var(--gold-300);animation:none;}
  .eyebrow{font-family:'Manrope',ui-sans-serif,sans-serif;font-weight:600;font-size:12px;letter-spacing:.14em;}

  /* ── Light sections: base ── */
  .sec-light{color:var(--lt-ink);}
  .sec-light.bg-ink-800{background:var(--paper)!important}
  .sec-light.bg-ink-900{background:var(--paper-2)!important}

  /* nested dark surfaces → white cards */
  .sec-light [class*="bg-ink-7"],
  .sec-light [class*="bg-ink-6"],
  .sec-light [class*="bg-ink-5"]{background:var(--card)!important;box-shadow:0 1px 0 rgba(18,18,22,.03),0 16px 44px -30px rgba(18,18,22,.28);}
  .sec-light [class*="bg-ink-8"],
  .sec-light [class*="bg-ink-9"]{background:var(--paper-2)!important}

  /* text remap */
  .sec-light [class*="text-bone-5"]{color:var(--lt-ink)!important}
  .sec-light [class*="text-bone-1"]{color:#202027!important}
  .sec-light [class*="text-bone-2"]{color:var(--lt-ink-2)!important}
  .sec-light [class*="text-bone-3"],
  .sec-light [class*="text-bone-4"]{color:var(--lt-ink-3)!important}
  .sec-light .placeholder-bone-400::placeholder{color:rgba(75,75,82,.5)!important}

  /* gold accents → deep gold for contrast on light */
  .sec-light [class*="text-gold"]{color:var(--gold-ink)!important}
  .sec-light .eyebrow{color:var(--gold-ink)}
  .sec-light .gold-shimmer{background:none;-webkit-background-clip:initial;background-clip:initial;color:var(--gold-deep);animation:none}
  .sec-light .rule-gold{background:linear-gradient(90deg,transparent,rgba(150,116,47,.55) 30%,rgba(150,116,47,.55) 70%,transparent)}

  /* lines */
  .sec-light [class*="border-white"]{border-color:var(--lt-line)!important}
  .sec-light [class*="divide-white"] > * + *{border-color:var(--lt-line)!important}
  .sec-light [class*="bg-white/"]{background:rgba(18,18,22,.05)!important}

  /* buttons — ICF ink pills on light */
  .sec-light .btn-gold{background:#15151a;color:#faf9f5}
  .sec-light .btn-gold:hover{background:var(--gold-500);color:#0a0a0c}
  .sec-light .btn-ghost{color:var(--lt-ink);border-color:var(--lt-line-strong)}
  .sec-light .btn-ghost:hover{border-color:var(--gold-ink);color:var(--gold-deep)}
  .sec-light .btn-dark{background:#15151a;color:#faf9f5;border-color:#15151a}
  .sec-light .btn-dark:hover{background:#000;border-color:#000}

  /* inputs */
  .sec-light input,.sec-light textarea,.sec-light select{background:#fff!important;border-color:var(--lt-line-strong)!important;color:var(--lt-ink)!important}
  .sec-light input::placeholder,.sec-light textarea::placeholder{color:var(--lt-ink-3)!important}

  /* ambient gold halos: soften on light */
  .sec-light [style*="rgba(216,182,106"]:not(.ph),
  .sec-light [style*="rgba(244,194,56"]:not(.ph){opacity:.5}

  .sec-light .glow{box-shadow:0 0 0 1px rgba(150,116,47,.2),0 30px 70px -40px rgba(18,18,22,.35)}

  /* donation active pill */
  .sec-light .bg-bone-50{background:#15151a!important;color:#faf9f5!important;border-color:#15151a!important}

  /* ── Keep cinematic dark inside photos & dark tiles (must come last) ── */
  .sec-light :is(.ph,.tile-dark){opacity:1}
  .sec-light .tile-dark{background:linear-gradient(135deg,#101014 0%,#15161b 100%)!important;box-shadow:none}
  .sec-light :is(.ph,.tile-dark) [class*="text-bone"]{color:#f3f2ec!important}
  .sec-light :is(.ph,.tile-dark) [class*="text-gold"]{color:#e3c98a!important}
  .sec-light :is(.ph,.tile-dark) .eyebrow{color:#d8b66a}
  .sec-light :is(.ph,.tile-dark) [class*="border-white"]{border-color:rgba(255,255,255,.16)!important}
  .sec-light :is(.ph,.tile-dark) [class*="bg-ink"]{background:rgba(10,10,12,.6)!important;box-shadow:none}
  .sec-light :is(.ph,.tile-dark) [class*="bg-white/"]{background:rgba(255,255,255,.07)!important}
</style>
</head>
<body>
